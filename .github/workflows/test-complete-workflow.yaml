name: Complete End-to-End Test - All Functions

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'install.sh'
  pull_request:
    branches:
      - main
    paths:
      - 'install.sh'

jobs:
  test-complete-lifecycle-english-amd64:
    name: Complete Test - English (amd64)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      
      - name: Make script executable
        run: chmod +x ./install.sh
      
      - name: "1. Test Help Function"
        run: |
          echo "========================================"
          echo "TEST 1: Help Function"
          echo "========================================"
          ./install.sh <<EOF
          2
          6
          EOF
      
      - name: "2. Full Installation with all components"
        run: |
          echo "========================================"
          echo "TEST 2: Full Installation"
          echo "========================================"
          ./install.sh <<EOF
          2
          1
          y
          y
          y
          y
          n
          y
          y
          y
          y
          y
          admin
          password
          EOF
      
      - name: "3. Verify Installation"
        run: |
          echo "========================================"
          echo "TEST 3: Verify Installation"
          echo "========================================"
          echo "=== Docker Containers ==="
          docker ps -a
          echo ""
          echo "=== Container Health ==="
          for container in rtmp-server srtla-server slspanel wud; do
            if docker ps --format '{{.Names}}' | grep -q "^$container$"; then
              status=$(docker inspect --format='{{.State.Status}}' $container 2>/dev/null || echo "not found")
              health=$(docker inspect --format='{{.State.Health.Status}}' $container 2>/dev/null || echo "no healthcheck")
              echo "✓ $container: Status=$status, Health=$health"
            else
              echo "✗ $container: Not found"
              exit 1
            fi
          done
          echo ""
          echo "=== API Key File ==="
          if [ -f ".apikey" ]; then
            echo "✓ API key file exists ($(wc -c < .apikey) bytes)"
          else
            echo "✗ API key file not found"
            exit 1
          fi
          echo ""
          echo "=== Docker Volumes ==="
          docker volume ls
          if docker volume ls --format '{{.Name}}' | grep -q "srtla-server"; then
            echo "✓ srtla-server volume exists"
          else
            echo "✗ srtla-server volume not found"
            exit 1
          fi
      
      - name: "4. Test Stop Function"
        run: |
          echo "========================================"
          echo "TEST 4: Stop All Containers"
          echo "========================================"
          ./install.sh <<EOF
          2
          3
          EOF
      
      - name: "5. Verify Stop"
        run: |
          echo "========================================"
          echo "TEST 5: Verify Stop"
          echo "========================================"
          docker ps -a
          running_count=$(docker ps --format '{{.Names}}' | grep -E '(rtmp-server|srtla-server|slspanel|wud)' | wc -l)
          if [ $running_count -eq 0 ]; then
            echo "✓ All containers stopped successfully"
          else
            echo "✗ Some containers still running: $running_count"
            docker ps
            exit 1
          fi
      
      - name: "6. Test Start Function"
        run: |
          echo "========================================"
          echo "TEST 6: Start All Containers"
          echo "========================================"
          ./install.sh <<EOF
          2
          2
          EOF
      
      - name: "7. Verify Start"
        run: |
          echo "========================================"
          echo "TEST 7: Verify Start"
          echo "========================================"
          docker ps -a
          echo ""
          for container in rtmp-server srtla-server slspanel wud; do
            if docker ps --format '{{.Names}}' | grep -q "^$container$"; then
              echo "✓ $container is running"
            else
              echo "✗ $container is not running"
              exit 1
            fi
          done
      
      - name: "8. Test Update Function"
        run: |
          echo "========================================"
          echo "TEST 8: Update All Containers"
          echo "========================================"
          ./install.sh <<EOF
          2
          4
          EOF
      
      - name: "9. Verify Update"
        run: |
          echo "========================================"
          echo "TEST 9: Verify Update"
          echo "========================================"
          docker ps -a
          echo ""
          echo "=== Container Restart Times ==="
          for container in rtmp-server srtla-server slspanel wud; do
            if docker ps --format '{{.Names}}' | grep -q "^$container$"; then
              uptime=$(docker inspect --format='{{.State.StartedAt}}' $container)
              echo "✓ $container restarted at: $uptime"
            else
              echo "✗ $container not running after update"
              exit 1
            fi
          done
          echo ""
          if [ -f ".apikey" ]; then
            echo "✓ API key file still exists after update"
          else
            echo "✗ API key file missing after update"
            exit 1
          fi
      
      - name: "10. Test Uninstall Keep Volumes"
        run: |
          echo "========================================"
          echo "TEST 10: Uninstall (Keep Volumes)"
          echo "========================================"
          ./install.sh <<EOF
          2
          5
          n
          EOF
      
      - name: "11. Verify Uninstall Keep Volumes"
        run: |
          echo "========================================"
          echo "TEST 11: Verify Uninstall (Volumes Kept)"
          echo "========================================"
          container_count=$(docker ps -a --format '{{.Names}}' | grep -E '(rtmp-server|srtla-server|slspanel|wud)' | wc -l)
          if [ $container_count -eq 0 ]; then
            echo "✓ All containers removed"
          else
            echo "✗ Some containers still exist: $container_count"
            docker ps -a
            exit 1
          fi
          echo ""
          if docker volume ls --format '{{.Name}}' | grep -q "srtla-server"; then
            echo "✓ Volume srtla-server kept as expected"
          else
            echo "✗ Volume srtla-server was removed unexpectedly"
            exit 1
          fi
          echo ""
          if [ ! -f ".apikey" ]; then
            echo "✓ API key file removed"
          else
            echo "✗ API key file still exists"
            exit 1
          fi
      
      - name: "12. Reinstall for Volume Removal Test"
        run: |
          echo "========================================"
          echo "TEST 12: Reinstall for Volume Test"
          echo "========================================"
          ./install.sh <<EOF
          2
          1
          n
          n
          y
          n
          n
          y
          y
          y
          admin
          password
          EOF
      
      - name: "13. Test Uninstall Remove Volumes"
        run: |
          echo "========================================"
          echo "TEST 13: Uninstall (Remove Volumes)"
          echo "========================================"
          ./install.sh <<EOF
          2
          5
          y
          EOF
      
      - name: "14. Verify Complete Uninstall"
        run: |
          echo "========================================"
          echo "TEST 14: Verify Complete Uninstall"
          echo "========================================"
          container_count=$(docker ps -a --format '{{.Names}}' | grep -E '(rtmp-server|srtla-server|slspanel|wud)' | wc -l)
          if [ $container_count -eq 0 ]; then
            echo "✓ All containers removed"
          else
            echo "✗ Some containers still exist: $container_count"
            exit 1
          fi
          echo ""
          volume_count=$(docker volume ls --format '{{.Name}}' | grep -E 'srtla-server' | wc -l)
          if [ $volume_count -eq 0 ]; then
            echo "✓ All volumes removed"
          else
            echo "✗ Some volumes still exist: $volume_count"
            exit 1
          fi
          echo ""
          if [ ! -f ".apikey" ]; then
            echo "✓ API key file removed"
          else
            echo "✗ API key file still exists"
            exit 1
          fi
      
      - name: "15. Test RTMP Only Installation"
        run: |
          echo "========================================"
          echo "TEST 15: Install RTMP Only"
          echo "========================================"
          ./install.sh <<EOF
          2
          1
          n
          n
          y
          y
          n
          n
          n
          EOF
      
      - name: "16. Verify RTMP Only"
        run: |
          echo "========================================"
          echo "TEST 16: Verify RTMP Only Installation"
          echo "========================================"
          if docker ps --format '{{.Names}}' | grep -q "^rtmp-server$"; then
            echo "✓ rtmp-server is running"
          else
            echo "✗ rtmp-server not found"
            exit 1
          fi
          if ! docker ps -a --format '{{.Names}}' | grep -q "srtla-server"; then
            echo "✓ srtla-server not installed (as expected)"
          else
            echo "✗ srtla-server was installed unexpectedly"
            exit 1
          fi
          docker rm -f rtmp-server
      
      - name: "17. Test SRTLA Only Installation"
        run: |
          echo "========================================"
          echo "TEST 17: Install SRTLA Only"
          echo "========================================"
          ./install.sh <<EOF
          2
          1
          n
          n
          y
          n
          n
          y
          n
          EOF
      
      - name: "18. Verify SRTLA Only"
        run: |
          echo "========================================"
          echo "TEST 18: Verify SRTLA Only Installation"
          echo "========================================"
          if docker ps --format '{{.Names}}' | grep -q "^srtla-server$"; then
            echo "✓ srtla-server is running"
          else
            echo "✗ srtla-server not found"
            exit 1
          fi
          if ! docker ps -a --format '{{.Names}}' | grep -q "rtmp-server"; then
            echo "✓ rtmp-server not installed (as expected)"
          else
            echo "✗ rtmp-server was installed unexpectedly"
            exit 1
          fi
          docker rm -f srtla-server
          docker volume rm srtla-server 2>/dev/null || true
      
      - name: "19. Test Installation with WUD Labels"
        run: |
          echo "========================================"
          echo "TEST 19: Install with WUD Monitoring"
          echo "========================================"
          ./install.sh <<EOF
          2
          1
          n
          n
          y
          y
          y
          y
          y
          y
          y
          y
          admin
          password
          EOF
      
      - name: "20. Verify WUD Labels"
        run: |
          echo "========================================"
          echo "TEST 20: Verify WUD Labels"
          echo "========================================"
          for container in rtmp-server srtla-server slspanel; do
            if docker ps --format '{{.Names}}' | grep -q "^$container$"; then
              labels=$(docker inspect --format='{{json .Config.Labels}}' $container)
              if echo "$labels" | grep -q "wud.watch"; then
                echo "✓ $container has WUD labels"
              else
                echo "✗ $container missing WUD labels"
                exit 1
              fi
            fi
          done
          if docker ps --format '{{.Names}}' | grep -q "^wud$"; then
            echo "✓ WUD container is running"
          else
            echo "✗ WUD container not found"
            exit 1
          fi
      
      - name: "21. Final Cleanup"
        run: |
          echo "========================================"
          echo "TEST 21: Final Cleanup"
          echo "========================================"
          ./install.sh <<EOF
          2
          5
          y
          EOF
          echo "✓ Complete cleanup successful"
      
      - name: "22. Test Summary"
        if: always()
        run: |
          echo "========================================"
          echo "COMPLETE TEST SUMMARY"
          echo "========================================"
          echo "Tests completed:"
          echo "  1. ✓ Help Function"
          echo "  2. ✓ Full Installation"
          echo "  3. ✓ Installation Verification"
          echo "  4. ✓ Stop Function"
          echo "  5. ✓ Stop Verification"
          echo "  6. ✓ Start Function"
          echo "  7. ✓ Start Verification"
          echo "  8. ✓ Update Function"
          echo "  9. ✓ Update Verification"
          echo " 10. ✓ Uninstall (Keep Volumes)"
          echo " 11. ✓ Uninstall Verification (Volumes Kept)"
          echo " 12. ✓ Reinstallation"
          echo " 13. ✓ Uninstall (Remove Volumes)"
          echo " 14. ✓ Complete Uninstall Verification"
          echo " 15. ✓ RTMP Only Installation"
          echo " 16. ✓ RTMP Only Verification"
          echo " 17. ✓ SRTLA Only Installation"
          echo " 18. ✓ SRTLA Only Verification"
          echo " 19. ✓ Installation with WUD"
          echo " 20. ✓ WUD Labels Verification"
          echo " 21. ✓ Final Cleanup"
          echo "========================================"
          echo "All 21 tests passed successfully!"
          echo "========================================"

