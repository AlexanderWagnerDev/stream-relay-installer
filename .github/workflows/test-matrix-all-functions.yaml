name: Matrix Test - All Functions

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'install.sh'
      - '.github/workflows/test-matrix-all-functions.yaml'
  pull_request:
    branches:
      - main
    paths:
      - 'install.sh'

jobs:
  test-install-functions:
    name: Test ${{ matrix.function }} (${{ matrix.language }}, ${{ matrix.arch }})
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm64' || 'ubuntu-latest' }}
    permissions:
      contents: read
    
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
        language: [english, german]
        function:
          - install-all
          - install-rtmp-only
          - install-srtla-only
          - install-with-wud
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      
      - name: Make script executable
        run: chmod +x ./install.sh
      
      - name: Test Install All (English)
        if: matrix.function == 'install-all' && matrix.language == 'english'
        run: |
          ./install.sh <<EOF
          2
          1
          y
          y
          y
          y
          n
          y
          y
          y
          y
          y
          admin
          password
          EOF
      
      - name: Test Install All (German)
        if: matrix.function == 'install-all' && matrix.language == 'german'
        run: |
          ./install.sh <<EOF
          1
          1
          j
          j
          j
          j
          n
          j
          j
          j
          j
          j
          admin
          password
          EOF
      
      - name: Test Install RTMP Only (English)
        if: matrix.function == 'install-rtmp-only' && matrix.language == 'english'
        run: |
          ./install.sh <<EOF
          2
          1
          y
          n
          y
          y
          n
          n
          n
          EOF
      
      - name: Test Install RTMP Only (German)
        if: matrix.function == 'install-rtmp-only' && matrix.language == 'german'
        run: |
          ./install.sh <<EOF
          1
          1
          j
          n
          j
          j
          n
          n
          n
          EOF
      
      - name: Test Install SRTLA Only (English)
        if: matrix.function == 'install-srtla-only' && matrix.language == 'english'
        run: |
          ./install.sh <<EOF
          2
          1
          y
          n
          y
          n
          n
          y
          n
          EOF
      
      - name: Test Install SRTLA Only (German)
        if: matrix.function == 'install-srtla-only' && matrix.language == 'german'
        run: |
          ./install.sh <<EOF
          1
          1
          j
          n
          j
          n
          n
          j
          n
          EOF
      
      - name: Test Install with WUD (English)
        if: matrix.function == 'install-with-wud' && matrix.language == 'english'
        run: |
          ./install.sh <<EOF
          2
          1
          y
          n
          y
          y
          y
          y
          y
          y
          y
          y
          admin
          password
          EOF
      
      - name: Test Install with WUD (German)
        if: matrix.function == 'install-with-wud' && matrix.language == 'german'
        run: |
          ./install.sh <<EOF
          1
          1
          j
          n
          j
          j
          j
          j
          j
          j
          j
          j
          admin
          password
          EOF
      
      - name: Verify Docker containers
        run: |
          echo "=== Docker Containers ==="
          docker ps -a
          echo ""
          echo "=== Docker Images ==="
          docker images
      
      - name: Check container health
        run: |
          echo "=== Container Health Status ==="
          for container in rtmp-server srtla-server slspanel wud; do
            if docker ps --format '{{.Names}}' | grep -q "^$container$"; then
              status=$(docker inspect --format='{{.State.Status}}' $container 2>/dev/null || echo "not found")
              health=$(docker inspect --format='{{.State.Health.Status}}' $container 2>/dev/null || echo "no healthcheck")
              echo "$container: Status=$status, Health=$health"
            fi
          done

  test-lifecycle-functions:
    name: Test Lifecycle (${{ matrix.language }}, ${{ matrix.arch }})
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm64' || 'ubuntu-latest' }}
    permissions:
      contents: read
    
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
        language: [english, german]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      
      - name: Make script executable
        run: chmod +x ./install.sh
      
      - name: Install (English)
        if: matrix.language == 'english'
        run: |
          ./install.sh <<EOF
          2
          1
          y
          n
          y
          y
          y
          y
          y
          y
          y
          y
          admin
          password
          EOF
      
      - name: Install (German)
        if: matrix.language == 'german'
        run: |
          ./install.sh <<EOF
          1
          1
          j
          n
          j
          j
          j
          j
          j
          j
          j
          j
          admin
          password
          EOF
      
      - name: Verify installation
        run: |
          echo "=== After Installation ==="
          docker ps -a
          echo ""
          for container in rtmp-server srtla-server slspanel wud; do
            if docker ps --format '{{.Names}}' | grep -q "^$container$"; then
              echo "✓ $container is running"
            fi
          done
      
      - name: Stop services (English)
        if: matrix.language == 'english'
        run: |
          ./install.sh <<EOF
          2
          3
          EOF
      
      - name: Stop services (German)
        if: matrix.language == 'german'
        run: |
          ./install.sh <<EOF
          1
          3
          EOF
      
      - name: Verify stop
        run: |
          echo "=== After Stop ==="
          docker ps -a
          echo ""
          running_count=$(docker ps --format '{{.Names}}' | grep -E '(rtmp-server|srtla-server|slspanel|wud)' | wc -l)
          if [ $running_count -eq 0 ]; then
            echo "✓ All containers stopped successfully"
          else
            echo "✗ Some containers still running: $running_count"
            exit 1
          fi
      
      - name: Start services (English)
        if: matrix.language == 'english'
        run: |
          ./install.sh <<EOF
          2
          2
          EOF
      
      - name: Start services (German)
        if: matrix.language == 'german'
        run: |
          ./install.sh <<EOF
          1
          2
          EOF
      
      - name: Verify start
        run: |
          echo "=== After Start ==="
          docker ps -a
          echo ""
          for container in rtmp-server srtla-server slspanel wud; do
            if docker ps --format '{{.Names}}' | grep -q "^$container$"; then
              echo "✓ $container is running"
            fi
          done
      
      - name: Update services (English)
        if: matrix.language == 'english'
        run: |
          ./install.sh <<EOF
          2
          4
          EOF
      
      - name: Update services (German)
        if: matrix.language == 'german'
        run: |
          ./install.sh <<EOF
          1
          4
          EOF
      
      - name: Verify update
        run: |
          echo "=== After Update ==="
          docker ps -a
          echo ""
          echo "=== Check if containers restarted ==="
          for container in rtmp-server srtla-server slspanel wud; do
            if docker ps --format '{{.Names}}' | grep -q "^$container$"; then
              uptime=$(docker inspect --format='{{.State.StartedAt}}' $container)
              echo "$container started at: $uptime"
            fi
          done
      
      - name: Uninstall with volume removal (English)
        if: matrix.language == 'english'
        run: |
          ./install.sh <<EOF
          2
          5
          y
          EOF
      
      - name: Uninstall with volume removal (German)
        if: matrix.language == 'german'
        run: |
          ./install.sh <<EOF
          1
          5
          j
          EOF
      
      - name: Verify uninstall
        run: |
          echo "=== After Uninstall ==="
          docker ps -a
          echo ""
          container_count=$(docker ps -a --format '{{.Names}}' | grep -E '(rtmp-server|srtla-server|slspanel|wud)' | wc -l)
          if [ $container_count -eq 0 ]; then
            echo "✓ All containers removed successfully"
          else
            echo "✗ Some containers still exist: $container_count"
            exit 1
          fi
          
          echo ""
          echo "=== Check volumes ==="
          volume_count=$(docker volume ls --format '{{.Name}}' | grep -E 'srtla-server' | wc -l)
          if [ $volume_count -eq 0 ]; then
            echo "✓ All volumes removed successfully"
          else
            echo "✗ Some volumes still exist: $volume_count"
            exit 1
          fi
          
          echo ""
          if [ ! -f ".apikey" ]; then
            echo "✓ API key file removed successfully"
          else
            echo "✗ API key file still exists"
            exit 1
          fi

  test-help:
    name: Test Help Function (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    strategy:
      fail-fast: false
      matrix:
        language: [english, german]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      
      - name: Make script executable
        run: chmod +x ./install.sh
      
      - name: Test Help (English)
        if: matrix.language == 'english'
        run: |
          ./install.sh <<EOF
          2
          6
          EOF
      
      - name: Test Help (German)
        if: matrix.language == 'german'
        run: |
          ./install.sh <<EOF
          1
          6
          EOF
