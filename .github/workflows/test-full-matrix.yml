name: Full Matrix Test

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  # ════════════════════════════════════════════
  # JOB 1 – ShellCheck Lint
  # ════════════════════════════════════════════
  lint:
    name: "Lint: ShellCheck"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Run ShellCheck
        run: shellcheck -e SC1091,SC2034,SC2162,SC2181,SC2155,SC2046,SC2086 install.sh

  # ════════════════════════════════════════════
  # JOB 2 – Install matrix (all variants)
  # ════════════════════════════════════════════
  install-matrix:
    name: "Install [${{ matrix.arch }}/${{ matrix.lang }}] ${{ matrix.variant }}"
    needs: lint
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:

          # ────────────────────────────────────
          # amd64 / English
          # ────────────────────────────────────

          # All services, no Docker install, no system update
          - arch: amd64
            runner: ubuntu-latest
            lang: en
            lang_input: "2"
            yes: "y"
            no: "n"
            variant: all-no-docker-no-update
            sys_update: "n"
            docker_install: "n"
            wud: "y"
            wud_labels: "y"
            rtmp: "y"
            srtla: "y"
            slspanel: "y"
            slspanel_login: "y"

          # All services + system update, no Docker install
          - arch: amd64
            runner: ubuntu-latest
            lang: en
            lang_input: "2"
            yes: "y"
            no: "n"
            variant: all-with-update-no-docker
            sys_update: "y"
            docker_install: "n"
            wud: "y"
            wud_labels: "y"
            rtmp: "y"
            srtla: "y"
            slspanel: "y"
            slspanel_login: "y"

          # All services + Docker install, no system update
          - arch: amd64
            runner: ubuntu-latest
            lang: en
            lang_input: "2"
            yes: "y"
            no: "n"
            variant: all-with-docker-no-update
            sys_update: "n"
            docker_install: "y"
            wud: "y"
            wud_labels: "y"
            rtmp: "y"
            srtla: "y"
            slspanel: "y"
            slspanel_login: "y"

          # All services + Docker install + system update
          - arch: amd64
            runner: ubuntu-latest
            lang: en
            lang_input: "2"
            yes: "y"
            no: "n"
            variant: all-with-docker-and-update
            sys_update: "y"
            docker_install: "y"
            wud: "y"
            wud_labels: "y"
            rtmp: "y"
            srtla: "y"
            slspanel: "y"
            slspanel_login: "y"

          # RTMP only
          - arch: amd64
            runner: ubuntu-latest
            lang: en
            lang_input: "2"
            yes: "y"
            no: "n"
            variant: rtmp-only
            sys_update: "n"
            docker_install: "n"
            wud: "n"
            wud_labels: "n"
