name: Test All Script Functions

on:
  workflow_dispatch:
    inputs:
      architecture:
        description: 'Architecture to test on'
        required: true
        default: 'amd64'
        type: choice
        options:
          - amd64
          - arm64
      language:
        description: 'Language for installation'
        required: true
        default: 'english'
        type: choice
        options:
          - english
          - german
      function:
        description: 'Function to test'
        required: true
        default: 'install-all'
        type: choice
        options:
          - install-all
          - install-rtmp-only
          - install-srtla-only
          - install-slspanel-only
          - install-with-wud
          - start
          - stop
          - update
          - uninstall-keep-volumes
          - uninstall-remove-volumes
          - help

jobs:
  test-script:
    runs-on: ${{ github.event.inputs.architecture == 'arm64' && 'ubuntu-24.04-arm64' || 'ubuntu-latest' }}
    permissions:
      contents: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      
      - name: Make script executable
        run: chmod +x ./install.sh
      
      - name: Test Install All (English)
        if: github.event.inputs.function == 'install-all' && github.event.inputs.language == 'english'
        run: |
          ./install.sh <<EOF
          2
          1
          y
          y
          y
          y
          n
          y
          y
          y
          y
          y
          admin
          password
          EOF
      
      - name: Test Install All (German)
        if: github.event.inputs.function == 'install-all' && github.event.inputs.language == 'german'
        run: |
          ./install.sh <<EOF
          1
          1
          j
          j
          j
          j
          n
          j
          j
          j
          j
          j
          admin
          password
          EOF
      
      - name: Test Install RTMP Only (English)
        if: github.event.inputs.function == 'install-rtmp-only' && github.event.inputs.language == 'english'
        run: |
          ./install.sh <<EOF
          2
          1
          y
          n
          y
          y
          n
          n
          n
          EOF
      
      - name: Test Install RTMP Only (German)
        if: github.event.inputs.function == 'install-rtmp-only' && github.event.inputs.language == 'german'
        run: |
          ./install.sh <<EOF
          1
          1
          j
          n
          j
          j
          n
          n
          n
          EOF
      
      - name: Test Install SRTLA Only (English)
        if: github.event.inputs.function == 'install-srtla-only' && github.event.inputs.language == 'english'
        run: |
          ./install.sh <<EOF
          2
          1
          y
          n
          y
          n
          n
          y
          n
          EOF
      
      - name: Test Install SRTLA Only (German)
        if: github.event.inputs.function == 'install-srtla-only' && github.event.inputs.language == 'german'
        run: |
          ./install.sh <<EOF
          1
          1
          j
          n
          j
          n
          n
          j
          n
          EOF
      
      - name: Test Install SLSPanel Only (English)
        if: github.event.inputs.function == 'install-slspanel-only' && github.event.inputs.language == 'english'
        run: |
          ./install.sh <<EOF
          2
          1
          y
          n
          y
          n
          n
          y
          y
          y
          admin
          password
          EOF
      
      - name: Test Install SLSPanel Only (German)
        if: github.event.inputs.function == 'install-slspanel-only' && github.event.inputs.language == 'german'
        run: |
          ./install.sh <<EOF
          1
          1
          j
          n
          j
          n
          n
          j
          j
          j
          admin
          password
          EOF
      
      - name: Test Install with WUD (English)
        if: github.event.inputs.function == 'install-with-wud' && github.event.inputs.language == 'english'
        run: |
          ./install.sh <<EOF
          2
          1
          y
          n
          y
          y
          y
          y
          y
          y
          y
          y
          admin
          password
          EOF
      
      - name: Test Install with WUD (German)
        if: github.event.inputs.function == 'install-with-wud' && github.event.inputs.language == 'german'
        run: |
          ./install.sh <<EOF
          1
          1
          j
          n
          j
          j
          j
          j
          j
          j
          j
          j
          admin
          password
          EOF
      
      - name: Setup for Start/Stop/Update tests
        if: contains(fromJSON('["start", "stop", "update"]'), github.event.inputs.function)
        run: |
          # Install first
          ./install.sh <<EOF
          ${{ github.event.inputs.language == 'english' && '2' || '1' }}
          1
          ${{ github.event.inputs.language == 'english' && 'y' || 'j' }}
          ${{ github.event.inputs.language == 'english' && 'n' || 'n' }}
          ${{ github.event.inputs.language == 'english' && 'y' || 'j' }}
          ${{ github.event.inputs.language == 'english' && 'y' || 'j' }}
          ${{ github.event.inputs.language == 'english' && 'y' || 'j' }}
          ${{ github.event.inputs.language == 'english' && 'y' || 'j' }}
          ${{ github.event.inputs.language == 'english' && 'y' || 'j' }}
          ${{ github.event.inputs.language == 'english' && 'y' || 'j' }}
          ${{ github.event.inputs.language == 'english' && 'y' || 'j' }}
          admin
          password
          EOF
      
      - name: Test Stop Function (English)
        if: github.event.inputs.function == 'stop' && github.event.inputs.language == 'english'
        run: |
          ./install.sh <<EOF
          2
          3
          EOF
      
      - name: Test Stop Function (German)
        if: github.event.inputs.function == 'stop' && github.event.inputs.language == 'german'
        run: |
          ./install.sh <<EOF
          1
          3
          EOF
      
      - name: Test Start Function (English)
        if: github.event.inputs.function == 'start' && github.event.inputs.language == 'english'
        run: |
          # Stop first
          ./install.sh <<EOF
          2
          3
          EOF
          # Then start
          ./install.sh <<EOF
          2
          2
          EOF
      
      - name: Test Start Function (German)
        if: github.event.inputs.function == 'start' && github.event.inputs.language == 'german'
        run: |
          # Stop first
          ./install.sh <<EOF
          1
          3
          EOF
          # Then start
          ./install.sh <<EOF
          1
          2
          EOF
      
      - name: Test Update Function (English)
        if: github.event.inputs.function == 'update' && github.event.inputs.language == 'english'
        run: |
          ./install.sh <<EOF
          2
          4
          EOF
      
      - name: Test Update Function (German)
        if: github.event.inputs.function == 'update' && github.event.inputs.language == 'german'
        run: |
          ./install.sh <<EOF
          1
          4
          EOF
      
      - name: Setup for Uninstall tests
        if: contains(fromJSON('["uninstall-keep-volumes", "uninstall-remove-volumes"]'), github.event.inputs.function)
        run: |
          # Install first
          ./install.sh <<EOF
          ${{ github.event.inputs.language == 'english' && '2' || '1' }}
          1
          ${{ github.event.inputs.language == 'english' && 'y' || 'j' }}
          ${{ github.event.inputs.language == 'english' && 'n' || 'n' }}
          ${{ github.event.inputs.language == 'english' && 'y' || 'j' }}
          ${{ github.event.inputs.language == 'english' && 'y' || 'j' }}
          ${{ github.event.inputs.language == 'english' && 'y' || 'j' }}
          ${{ github.event.inputs.language == 'english' && 'y' || 'j' }}
          ${{ github.event.inputs.language == 'english' && 'y' || 'j' }}
          ${{ github.event.inputs.language == 'english' && 'y' || 'j' }}
          ${{ github.event.inputs.language == 'english' && 'y' || 'j' }}
          admin
          password
          EOF
      
      - name: Test Uninstall Keep Volumes (English)
        if: github.event.inputs.function == 'uninstall-keep-volumes' && github.event.inputs.language == 'english'
        run: |
          ./install.sh <<EOF
          2
          5
          n
          EOF
      
      - name: Test Uninstall Keep Volumes (German)
        if: github.event.inputs.function == 'uninstall-keep-volumes' && github.event.inputs.language == 'german'
        run: |
          ./install.sh <<EOF
          1
          5
          n
          EOF
      
      - name: Test Uninstall Remove Volumes (English)
        if: github.event.inputs.function == 'uninstall-remove-volumes' && github.event.inputs.language == 'english'
        run: |
          ./install.sh <<EOF
          2
          5
          y
          EOF
      
      - name: Test Uninstall Remove Volumes (German)
        if: github.event.inputs.function == 'uninstall-remove-volumes' && github.event.inputs.language == 'german'
        run: |
          ./install.sh <<EOF
          1
          5
          j
          EOF
      
      - name: Test Help Function (English)
        if: github.event.inputs.function == 'help' && github.event.inputs.language == 'english'
        run: |
          ./install.sh <<EOF
          2
          6
          EOF
      
      - name: Test Help Function (German)
        if: github.event.inputs.function == 'help' && github.event.inputs.language == 'german'
        run: |
          ./install.sh <<EOF
          1
          6
          EOF
      
      - name: Verify Docker containers
        if: contains(fromJSON('["install-all", "install-rtmp-only", "install-srtla-only", "install-slspanel-only", "install-with-wud", "start", "update"]'), github.event.inputs.function)
        run: |
          echo "=== Docker Containers ==="
          docker ps -a
          echo ""
          echo "=== Docker Images ==="
          docker images
          echo ""
          echo "=== Docker Volumes ==="
          docker volume ls
      
      - name: Check container health
        if: contains(fromJSON('["install-all", "install-rtmp-only", "install-srtla-only", "install-slspanel-only", "install-with-wud", "start", "update"]'), github.event.inputs.function)
        run: |
          echo "=== Container Health Status ==="
          for container in rtmp-server srtla-server slspanel wud; do
            if docker ps --format '{{.Names}}' | grep -q "^$container$"; then
              status=$(docker inspect --format='{{.State.Status}}' $container 2>/dev/null || echo "not found")
              health=$(docker inspect --format='{{.State.Health.Status}}' $container 2>/dev/null || echo "no healthcheck")
              echo "$container: Status=$status, Health=$health"
            else
              echo "$container: Not running or doesn't exist"
            fi
          done
      
      - name: Check API key file
        if: contains(fromJSON('["install-all", "install-srtla-only", "install-slspanel-only", "update"]'), github.event.inputs.function)
        run: |
          if [ -f ".apikey" ]; then
            echo "API key file exists"
            echo "API key length: $(wc -c < .apikey) bytes"
          else
            echo "API key file not found"
          fi
      
      - name: Test container logs
        if: contains(fromJSON('["install-all", "install-rtmp-only", "install-srtla-only", "install-slspanel-only", "install-with-wud"]'), github.event.inputs.function)
        run: |
          echo "=== Container Logs (last 20 lines) ==="
          for container in rtmp-server srtla-server slspanel wud; do
            if docker ps --format '{{.Names}}' | grep -q "^$container$"; then
              echo "\n--- Logs for $container ---"
              docker logs --tail 20 $container 2>&1 || echo "Failed to get logs for $container"
            fi
          done
